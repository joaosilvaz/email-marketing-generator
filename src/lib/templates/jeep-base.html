<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="pt-br">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeep</title>
    <style>
        @media (max-width: 600px) {
            .block { display: block !important; }
            .center { text-align: center !important; }
            .full-width { width: 100% !important; }
            .hide { display: none !important; }
        }
    </style>
</head>
<body style="border:0;padding:0;margin:0;">
<table align="center" bgcolor="#FFF9E7" border="0" cellpadding="0" cellspacing="0" width="600">
<tr><td>

    <!-- ========== HERO IMAGE ========== -->
    <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#FFF9E7">
        <tr>
            <td align="center" style="padding:0;">
                <img src="{{heroImage}}" alt="{{heroAlt}}" width="600" style="display:block;border:0;width:100%;">
            </td>
        </tr>
    </table>

    <!-- ========== CTA BUTTON 1 ========== -->
    <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#FFF9E7">
        <tr>
            <td align="center" style="padding:20px 0 0;">
                <a href="{{ctaUrl}}" target="_blank">
                    <img src="{{ctaButtonImage}}" alt="{{ctaText1}}" width="400" style="display:block;border:0;">
                </a>
            </td>
        </tr>
    </table>

    <!-- ========== INTRO TEXT ========== -->
    <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td style="font-family:Arial,Helvetica,sans-serif;font-size:20px;line-height:1.2;color:#000000;padding:20px 0 40px;text-align:center;">
                {{introText}}
            </td>
        </tr>
    </table>

    <!-- ========== BANNER + TEXTO esquerda ========== -->
    <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#FFF9E7">
        <tr>
            <td style="font-family:Arial,Helvetica,sans-serif;font-size:22px;line-height:1.2;color:#000000;padding:0 0 0 40px;text-align:left;width:300px;">
                <span style="color:#cc5105;font-size:24px;font-weight:bold;">{{col1Title}}</span>
                <br><br>
                {{col1Text}}
            </td>
            <td align="center" style="padding:0;width:300px;">
                <img src="{{col1Image}}" alt="{{col1Alt}}" width="300" style="display:block;border:0;">
            </td>
        </tr>
    </table>

    <!-- ========== BANNER + TEXTO direita ========== -->
    <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#FFF9E7">
        <tr>
            <td align="center" style="padding:0;width:300px;">
                <img src="{{col2Image}}" alt="{{col2Alt}}" width="300" style="display:block;border:0;">
            </td>
            <td style="font-family:Arial,Helvetica,sans-serif;font-size:22px;line-height:1.2;color:#000000;padding:0 0 0 20px;text-align:left;width:300px;">
                <span style="color:#cc5105;font-size:24px;font-weight:bold;">{{col2Title}}</span>
                <br><br>
                {{col2Text}}
            </td>
        </tr>
    </table>

    <!-- ========== CTA BUTTON 2 ========== -->
    <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#FFF9E7">
        <tr>
            <td align="center" style="padding:40px 0;">
                <a href="{{ctaUrl}}" target="_blank">
                    <img src="{{ctaButton2Image}}" alt="{{ctaText2}}" width="335" style="display:block;border:0;">
                </a>
            </td>
        </tr>
    </table>

    <!-- ========== DARK SECTION ========== -->
    <table bgcolor="#662802" border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="center" style="padding-top:15px;font-family:Arial,Helvetica,sans-serif;font-size:22px;line-height:1.2;color:#ffffff;text-align:center;">
                <span style="color:#ffe39c;font-size:28px;font-weight:bold;">{{darkSectionTitle}}</span>
            </td>
        </tr>
        <tr>
            <td align="center" style="padding:10px 40px 15px;font-size:18px;color:#ffffff;font-family:Arial,Helvetica,sans-serif;line-height:1.2;text-align:center;">
                {{darkSectionText}}
            </td>
        </tr>
        <tr>
            <td align="center" style="padding:0 0 20px;line-height:0;font-size:0;">
                <img src="{{darkSectionImage}}" alt="Jeep" width="600" style="display:block;border:0;margin:0;padding:0;">
            </td>
        </tr>
        <tr>
            <td align="center" style="padding:0;line-height:0;font-size:0;">
                <a href="{{ctaUrl}}" target="_blank" style="text-decoration:none;display:inline-block;line-height:0;font-size:0;">
                    <img src="{{darkCtaImage}}" alt="{{darkCtaText}}" width="335" border="0" style="display:block;border:0;margin:0;padding:0;">
                </a>
            </td>
        </tr>
        <tr>
            <td align="center" style="padding:40px 0 45px;line-height:0;font-size:0;">
                <img src="{{jeepLogoWhite}}" alt="Jeep" width="174" style="display:block;border:0;margin:0;padding:0;">
            </td>
        </tr>
    </table>

    <!-- ========== EXTRA BLOCKS (list, etc) ========== -->
    <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#FFF9E7">
        {{extraBlocks}}
    </table>

    <!-- ========== FOOTER ========== -->
    <!-- Central de Serviços -->
    <table bgcolor="#ffffff" border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="center" style="color:#656565;font-family:Arial,Helvetica,sans-serif;font-size:22px;line-height:1.2;padding:25px 40px 20px;text-align:center;font-weight:bold;">
                CENTRAL DE SERVIÇOS AO CLIENTE
            </td>
        </tr>
    </table>

    <!-- WhatsApp + Telefone -->
    <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#ffffff">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0">
                    <tr>
                        <td align="center" style="padding-top:20px;">
                            <table cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="vertical-align:middle;font-family:Arial,Helvetica,sans-serif;font-size:22px;line-height:1.2;color:#656565;">
                                        <b>WHATSAPP JEEP</b><br>
                                        <div style="border-top:2px solid #656565;width:40px;margin:4px 0;font-size:0;line-height:0;">&nbsp;</div>
                                        <span style="font-size:18px;">(31) 2123-4000</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                        <td align="center" style="padding-top:20px;">
                            <table cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="vertical-align:middle;font-family:Arial,Helvetica,sans-serif;font-size:22px;line-height:1.2;color:#656565;">
                                        <b>TELEFONE</b><br>
                                        <div style="border-top:2px solid #656565;width:40px;margin:4px 0;font-size:0;line-height:0;">&nbsp;</div>
                                        <span style="font-size:18px;">0800 703 7150</span>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <!-- Divider -->
    <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#ffffff">
        <tr>
            <td align="center" style="padding:30px 0 20px;">
                <table width="550" cellpadding="0" cellspacing="0">
                    <tr><td style="border-top:2px solid #656565;font-size:0;line-height:0;">&nbsp;</td></tr>
                </table>
            </td>
        </tr>
    </table>

    <!-- Redes sociais -->
    <table width="100%" cellpadding="0" cellspacing="0" bgcolor="#ffffff">
        <tr>
            <td align="center">
                <table width="500" cellpadding="0" cellspacing="0">
                    <tr>
                        <td align="center" style="font-size:0;padding:20px 0;">
                            <a href="https://www.facebook.com/jeepbrasil" style="display:inline-block;padding:0 40px;" target="_blank">
                                <img src="{{socialFacebook}}" alt="Facebook" width="45" style="display:block;">
                            </a>
                            <a href="https://www.youtube.com/jeepbrasil" style="display:inline-block;padding:0 40px;" target="_blank">
                                <img src="{{socialYoutube}}" alt="Youtube" width="45" style="display:block;">
                            </a>
                            <a href="https://www.instagram.com/jeepbrasil" style="display:inline-block;padding:0 40px;" target="_blank">
                                <img src="{{socialInstagram}}" alt="Instagram" width="45" style="display:block;">
                            </a>
                            <a href="https://x.com/jeepbrasil" style="display:inline-block;padding:0 40px;" target="_blank">
                                <img src="{{socialX}}" alt="X" width="45" style="display:block;">
                            </a>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

    <!-- IBAMA + logo -->
    <table bgcolor="#ffffff" border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="left" style="padding:20px 0 20px 20px;">
                <span style="font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.3;color:#000000;">Desacelere. Seu bem maior é a vida.</span>
            </td>
            <td align="right" style="padding:20px;">
                <img src="{{brandLogo}}" alt="Jeep" width="80" style="display:block;">
            </td>
        </tr>
    </table>

</td></tr>
</table>
</body>
</html>
